; PlatformIO Project Configuration
; AI Voice Assistant - ESP32-S3 + Waveshare LCD 1.47"
; STT: Groq Whisper | LLM: DeepSeek | TTS: ElevenLabs

[env:esp32-s3-devkitc-1]
platform           = espressif32@^6.6.0
board              = esp32-s3-devkitc-1
framework          = arduino

monitor_speed      = 115200
upload_speed       = 921600
monitor_filters    = esp32_exception_decoder

; ---- Flash & PSRAM (Waveshare ESP32-S3 dùng OPI PSRAM 8MB, 16MB Flash) ----
board_build.partitions          = huge_app.csv
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_build.arduino.memory_type = qio_opi
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216

build_flags =
    ; PSRAM
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCONFIG_SPIRAM_CACHE_WORKAROUND
    ; USB CDC (Serial qua cổng USB-C)
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=1
    ; ST7789 172x320 cho Waveshare ESP32-S3 LCD 1.47"
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=172
    -DTFT_HEIGHT=320
    -DCGRAM_OFFSET=1
    -DTFT_MISO=-1
    -DTFT_MOSI=45
    -DTFT_SCLK=40
    -DTFT_CS=42
    -DTFT_DC=41
    -DTFT_RST=39
    -DTFT_BL=46
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DUSE_FSPI_PORT
    -DSPI_FREQUENCY=40000000

; ---- Thư viện ----
;   - TFT_eSPI         : driver ST7789 172x320
;   - Adafruit NeoPixel: RGB LED onboard
;   - ArduinoJson      : parse/serialize JSON cho Groq, DeepSeek, ElevenLabs
;   - ESP32-audioI2S   : decode MP3 từ ElevenLabs và phát qua MAX98357
;   - WiFiManager      : captive portal cấu hình WiFi
;   HTTPClient / WiFiClientSecure / SD / driver/i2s đã có sẵn trong core ESP32 Arduino
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    adafruit/Adafruit NeoPixel@^1.12.3
    bblanchon/ArduinoJson@^7.2.0
    esphome/ESP32-audioI2S@^2.0.7
    https://github.com/tzapu/WiFiManager.git
    links2004/WebSockets@^2.4.1
